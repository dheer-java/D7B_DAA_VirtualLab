<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kruskal Algorithm Simulation</title>
<style>
    body { font-family: Arial, sans-serif; background: #0f172a; color: white; text-align: center; }
    canvas { border: 2px solid #38bdf8; margin-top: 15px; background: #020617; }
    button, select, input { padding: 8px 12px; margin: 8px; border-radius: 8px; border: none; cursor: pointer; }
    #controls { margin-top: 10px; }
    #log {
        margin-top: 15px; width: 80%; margin-left: auto; margin-right: auto;
        background: #020617; padding: 12px; border-radius: 10px; height: 160px;
        overflow-y: auto; text-align: left; border: 1px solid #38bdf8;
    }
    #infoPanel { margin-top: 10px; display: flex; justify-content: center; gap: 20px; font-size: 16px; }
    .box { padding: 10px 15px; border-radius: 8px; background: #020617; border: 1px solid #38bdf8; }
    .step { margin-bottom: 5px; }
    .good { color: #22c55e; }
    .bad { color: #ef4444; }
    .info { color: #38bdf8; }
</style>
</head>
<body>

<h1>Kruskal's Algorithm Simulation</h1>

<div id="controls">
    <select id="graphSelect">
        <option value="1">Example 1</option>
        <option value="2">Example 2</option>
        <option value="3">Example 3</option>
    </select>
    <button onclick="loadGraph()">Load</button>
    <button onclick="startSimulation()">Start</button>
    <button onclick="resetGraph()">Reset</button>
    Speed: <input type="range" id="speed" min="200" max="2000" value="1000">
</div>

<div id="infoPanel">
    <div class="box">Total Cost: <span id="cost">0</span></div>
</div>

<div id="legend" style="display:flex;justify-content:center;gap:20px;margin-top:10px;">
    <div class="box">🟡 Yellow: Current Edge</div>
    <div class="box">🟢 Green: In MST</div>
    <div class="box">🔴 Red: Rejected (cycle)</div>
    <div class="box">⚪ Grey: Not processed</div>
</div>

<canvas id="canvas" width="600" height="400"></canvas>
<div id="log"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const logBox = document.getElementById('log');
const costBox = document.getElementById('cost');

let nodes = [];
let edges = [];
let parent = [];
let currentEdge = null;
let rejectedEdges = []; // 🔴 NEW

function loadGraph() {
    const val = document.getElementById("graphSelect").value;

    if(val == "1") {
        nodes = [{x:100,y:100},{x:300,y:50},{x:500,y:100},{x:200,y:300},{x:400,y:300}];
        edges = [
            {u:0,v:1,w:4},{u:0,v:3,w:3},{u:1,v:2,w:2},
            {u:1,v:3,w:5},{u:2,v:4,w:1},{u:3,v:4,w:6}
        ];
    }

    if(val == "2") {
        nodes = [{x:100,y:200},{x:250,y:50},{x:450,y:80},{x:500,y:250},{x:300,y:350}];
        edges = [
            {u:0,v:1,w:6},{u:1,v:2,w:2},{u:2,v:3,w:3},
            {u:3,v:4,w:4},{u:4,v:0,w:5},{u:1,v:4,w:1}
        ];
    }

    if(val == "3") {
        nodes = [{x:80,y:200},{x:200,y:80},{x:350,y:80},{x:500,y:200},{x:350,y:320},{x:200,y:320}];
        edges = [
            {u:0,v:1,w:3},{u:1,v:2,w:1},{u:2,v:3,w:4},
            {u:3,v:4,w:2},{u:4,v:5,w:6},{u:5,v:0,w:5},
            {u:1,v:4,w:7},{u:2,v:5,w:8}
        ];
    }

    rejectedEdges = []; // reset
    drawGraph();
    logBox.innerHTML = "<div class='info'>Graph loaded</div>";
    costBox.innerText = 0;
}

function resetGraph() { loadGraph(); }

function find(x) {
    if(parent[x] === x) return x;
    return parent[x] = find(parent[x]);
}

function union(x,y) { parent[find(x)] = find(y); }

function drawGraph(selectedEdges=[]) {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    edges.forEach(e => {
        ctx.beginPath();
        ctx.moveTo(nodes[e.u].x,nodes[e.u].y);
        ctx.lineTo(nodes[e.v].x,nodes[e.v].y);

        // priority fix: rejected > current > selected
        if(rejectedEdges.includes(e)) {
            ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 3; // red
        }
        else if(e === currentEdge) {
            ctx.strokeStyle = "yellow"; ctx.lineWidth = 4;
        }
        else if(selectedEdges.includes(e)) {
            ctx.strokeStyle = "#22c55e"; ctx.lineWidth = 4;
        }
        else if(selectedEdges.includes(e)) {
            ctx.strokeStyle = "#22c55e"; ctx.lineWidth = 4;
        }
        else if(rejectedEdges.includes(e)) {
            ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 3; // 🔴 FIX
        }
        else {
            ctx.strokeStyle = "#64748b"; ctx.lineWidth = 2;
        }
        ctx.stroke();

        ctx.fillStyle = "white";
        ctx.fillText(e.w,
            (nodes[e.u].x + nodes[e.v].x)/2,
            (nodes[e.u].y + nodes[e.v].y)/2);
    });

    nodes.forEach((n,i) => {
        ctx.beginPath();
        ctx.arc(n.x,n.y,15,0,2*Math.PI);
        ctx.fillStyle = "#38bdf8";
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.fillText(i,n.x-5,n.y+5);
    });
}

function log(msg, type="info") {
    const div = document.createElement("div");
    div.className = "step " + type;
    div.innerHTML = msg;
    logBox.appendChild(div);
    logBox.scrollTop = logBox.scrollHeight;
}

async function startSimulation() {
    logBox.innerHTML = "";
    parent = nodes.map((_,i)=>i);
    rejectedEdges = []; // 🔴 reset each run

    edges.sort((a,b)=>a.w-b.w);
    log("Edges sorted by weight", "info");

    let mst = [];
    let totalCost = 0;

    for(let e of edges) {
        currentEdge = e;
        drawGraph(mst);

        await new Promise(r => setTimeout(r, document.getElementById('speed').value));

        log(`Checking edge (${e.u}-${e.v}) weight ${e.w}`, "info");

        if(find(e.u) !== find(e.v)) {
            union(e.u,e.v);
            mst.push(e);
            totalCost += e.w;
            costBox.innerText = totalCost;
            log("Edge added to MST", "good");
        } else {
            rejectedEdges.push(e); // 🔴 TRACK REJECTED
            log("Cycle detected → skipped", "bad");
        }

        drawGraph(mst);
    }

    currentEdge = null;
    log("MST Completed", "good");
}

loadGraph();
</script>

</body>
</html>
